<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Transactions — Infinite Scroll + Clear Context</title>
  <style>
    :root{
      --bg:#071014;
      --surface:#0b171d;
      --line:rgba(255,255,255,.08);
      --line2:rgba(255,255,255,.12);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.62);
      --muted2:rgba(255,255,255,.45);
      --good:#62d7b4;
      --bad:#ff8a6a;
      --tabular: tabular-nums;
      --r:14px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 800px at 50% -200px, rgba(98,215,180,.10), transparent 55%),
        radial-gradient(1000px 700px at 90% 0px, rgba(255,138,106,.08), transparent 55%),
        var(--bg);
    }

    .app{
      width:min(430px, 100vw);
      height:100vh;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      padding:12px 12px 18px;
    }

    /* Sticky controls */
    .top{
      position:sticky;
      top:0;
      z-index:10;
      padding-top:8px;
      background:linear-gradient(180deg, rgba(7,16,20,1), rgba(7,16,20,.88));
      border-bottom:1px solid var(--line);
    }

    .header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      padding:8px 2px 10px;
    }

    .h-left{
      display:flex;
      flex-direction:column;
      gap:4px;
      min-width:0;
    }

    .title{
      font-size:15px;
      letter-spacing:.02em;
      color:rgba(255,255,255,.90);
    }

    /* Context line is explicitly Period + Scope, not "filters" */
    .context{
      font-size:12px;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--muted2);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .h-right{
      display:flex;
      align-items:center;
      gap:8px;
      flex:0 0 auto;
    }

    .pill{
      padding:8px 10px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      border-radius:999px;
      font-size:13px;
      color:rgba(255,255,255,.84);
      user-select:none;
      white-space:nowrap;
    }

    .pill .k{
      color:var(--muted2);
      letter-spacing:.10em;
      text-transform:uppercase;
      font-size:11px;
      margin-right:6px;
    }

    .iconbtn{
      width:40px;
      height:36px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      display:grid;
      place-items:center;
      position:relative;
      cursor:pointer;
      user-select:none;
    }
    .iconbtn:hover{ border-color:rgba(255,255,255,.14); background:rgba(255,255,255,.05); }

    .badge{
      position:absolute;
      top:-6px;
      right:-6px;
      min-width:18px;
      height:18px;
      padding:0 6px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.06);
      color:rgba(255,255,255,.82);
      font-size:11px;
      display:none;
      align-items:center;
      justify-content:center;
      font-variant-numeric:var(--tabular);
    }

    /* Search */
    .search{ padding:0 2px 10px; }
    .searchbox{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.02);
      border-radius:14px;
    }
    .searchbox svg{ width:16px; height:16px; opacity:.75; }
    .searchbox input{
      flex:1;
      border:0;
      outline:0;
      background:transparent;
      color:rgba(255,255,255,.90);
      font-size:14px;
    }
    .searchbox input::placeholder{ color:rgba(255,255,255,.35); }
    .clear{
      width:26px;
      height:26px;
      border-radius:10px;
      display:grid;
      place-items:center;
      border:1px solid var(--line);
      background:rgba(255,255,255,.02);
      cursor:pointer;
      display:none;
    }
    .clear:hover{ background:rgba(255,255,255,.05); border-color:rgba(255,255,255,.14); }
    .clear svg{ width:14px; height:14px; opacity:.8; }

    /* Meta line, explicitly separate from Period/Scope */
    .meta{
      padding:0 2px 12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .metaline{
      font-size:12px;
      color:var(--muted2);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .meta-right{
      display:flex;
      align-items:center;
      gap:8px;
      color:var(--muted2);
      font-size:12px;
      flex:0 0 auto;
      font-variant-numeric:var(--tabular);
    }

    /* Demo scenario switch */
    .scenarios{
      padding:0 2px 12px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .seg{
      padding:8px 10px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.02);
      border-radius:999px;
      font-size:12px;
      color:rgba(255,255,255,.78);
      cursor:pointer;
      user-select:none;
    }
    .seg.active{
      border-color:rgba(255,255,255,.18);
      background:rgba(255,255,255,.05);
      color:rgba(255,255,255,.88);
    }

    /* Aggregate block scrolls away */
    .agg{
      padding:10px 2px 12px;
      border-top:1px solid var(--line);
      border-bottom:1px solid var(--line);
      margin:0 0 10px;
      background:rgba(255,255,255,.01);
    }
    .aggrow{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      padding:8px 0;
      gap:10px;
    }
    .aggrow .k{
      font-size:12px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted2);
    }
    .aggrow .v{
      font-size:16px;
      font-variant-numeric:var(--tabular);
      color:rgba(255,255,255,.90);
      white-space:nowrap;
    }
    .v.good{ color:rgba(98,215,180,.92); }
    .v.bad{ color:rgba(255,138,106,.92); }

    /* List */
    .content{
      flex:1;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      padding:4px 2px 0;
    }

    .month{
      margin-top:8px;
      padding:10px 0 8px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:10px;
    }
    .month .m{
      font-size:12px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted2);
    }
    .month .mtotal{
      font-size:12px;
      font-variant-numeric:var(--tabular);
      color:var(--muted2);
      white-space:nowrap;
    }

    .day{
      padding:12px 0 8px;
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:10px;
    }
    .day .d{
      font-size:12px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted2);
      white-space:nowrap;
    }
    .day .dtotal{
      font-size:12px;
      font-variant-numeric:var(--tabular);
      color:rgba(255,255,255,.72);
      white-space:nowrap;
    }
    .sep{ height:1px; background:var(--line); }

    .tx{
      display:grid;
      grid-template-columns: 1fr auto;
      gap:12px;
      padding:12px 0;
      border-bottom:1px solid var(--line);
      align-items:center;
    }
    .tx-left{ min-width:0; }
    .tx-name{
      font-size:16px;
      color:rgba(255,255,255,.92);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .tx-sub{
      margin-top:4px;
      font-size:13px;
      color:var(--muted2);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .tx-amt{
      font-size:16px;
      font-variant-numeric:var(--tabular);
      white-space:nowrap;
    }
    .tx-amt.good{ color:rgba(98,215,180,.92); }
    .tx-amt.bad{ color:rgba(255,138,106,.92); }

    .empty{
      padding:18px 0;
      color:var(--muted2);
      font-size:13px;
    }

    .loader{
      padding:14px 0 18px;
      color:var(--muted2);
      font-size:12px;
      letter-spacing:.12em;
      text-transform:uppercase;
      text-align:center;
      border-top:1px solid var(--line);
    }

    .safe{ height:18px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <div class="header">
        <div class="h-left">
          <div class="title">Transactions</div>
          <div class="context" id="contextLine">Period: Feb 2026 · Scope: All</div>
        </div>

        <div class="h-right">
          <div class="pill" id="periodPill"><span class="k">Period</span><span id="periodVal">Feb 2026</span></div>
          <div class="pill" id="scopePill"><span class="k">Scope</span><span id="scopeVal">All</span></div>

          <div class="iconbtn" id="filterBtn" aria-label="Filters">
            <span class="badge" id="filterBadge">2</span>
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M4 6h16M7 12h10M10 18h4" stroke="rgba(255,255,255,.78)" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="search">
        <div class="searchbox">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" stroke="rgba(255,255,255,.78)" stroke-width="2"/>
            <path d="M16.5 16.5 21 21" stroke="rgba(255,255,255,.78)" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <input id="searchInput" placeholder="Search transactions" />
          <div class="clear" id="clearBtn" title="Clear">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M7 7l10 10M17 7 7 17" stroke="rgba(255,255,255,.78)" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="meta">
        <div class="metaline" id="metaLine">No filters applied</div>
        <div class="meta-right" id="metaRight">Showing 0</div>
      </div>

      <div class="scenarios" aria-label="Scenarios (demo)">
        <div class="seg active" data-scn="default">Default</div>
        <div class="seg" data-scn="filter1">Filter 1</div>
        <div class="seg" data-scn="filter2">Filter 2</div>
        <div class="seg" data-scn="search">Search</div>
      </div>
    </div>

    <div class="agg" id="agg">
      <div class="aggrow">
        <div class="k">Net</div>
        <div class="v" id="netVal">$0.00</div>
      </div>
      <div class="aggrow">
        <div class="k">Inflow</div>
        <div class="v good" id="inVal">$0.00</div>
      </div>
      <div class="aggrow">
        <div class="k">Outflow</div>
        <div class="v bad" id="outVal">($0.00)</div>
      </div>
    </div>

    <div class="content" id="content"></div>
    <div class="loader" id="loader" style="display:none;">Loading older transactions</div>
    <div class="safe"></div>
  </div>

  <script>
    // -------- helpers ----------
    function money(n, opts={paren:true}) {
      const signNeg = n < 0
      const abs = Math.abs(n)
      const s = abs.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})
      const val = "$" + s
      if (!signNeg) return val
      return opts.paren ? "(" + val + ")" : "-" + val
    }
    function sum(list, fn){ return list.reduce((a,x)=>a+fn(x), 0) }

    function impact(tx){
      if (tx.type === "inflow") return +tx.amount
      if (tx.type === "outflow") return -tx.amount
      return 0
    }

    function matchesSearch(tx, q){
      if (!q) return true
      const s = q.toLowerCase().trim()
      if (!s) return true
      const fields = [
        tx.merchant, tx.meta, tx.category, tx.subcategory, tx.account, tx.note,
        tx.amount.toFixed(2), tx.date
      ].join(" ").toLowerCase()
      return fields.includes(s)
    }

    function formatMonth(dateStr){
      const d = new Date(dateStr + "T12:00:00")
      const month = d.toLocaleString(undefined, { month:"long" })
      return `${month} ${d.getFullYear()}`
    }
    function formatDow(dateStr){
      const d = new Date(dateStr + "T12:00:00")
      return d.toLocaleString(undefined, { weekday:"short" })
    }

    // -------- demo dataset generator ----------
    // Generates a long history so you can scroll to the end
    const MERCHANTS = [
      ["Groceries","Trader Joe's · Chase Prime Visa","Food","Groceries","Chase Prime Visa"],
      ["Coffee","Stumptown · Cash","Food","Coffee","Cash"],
      ["Dinner","Shake Shack · Chase Sapphire Reserve","Food","Dining","Chase Sapphire Reserve"],
      ["MTA","Transit · Apple Pay","Transport","Transit","Apple Pay"],
      ["Rent","Housing · Checking","Housing","Rent","Checking"],
      ["HOA / Maintenance","Housing · Checking","Housing","HOA","Checking"],
      ["Gym","Fitness · Card","Health","Gym","Chase Sapphire Reserve"],
      ["Dividend","Investments · Brokerage","Income","Dividend","Brokerage"],
      ["Salary","Employer Payroll · Checking","Income","Salary","Checking"],
      ["Transfer","Checking → Savings","Transfer","Internal","Checking"]
    ]

    function rand(min,max){ return Math.random()*(max-min)+min }
    function pick(arr){ return arr[Math.floor(Math.random()*arr.length)] }

    // build ~420 transactions spanning ~14 months back from Feb 2026
    const ALL = []
    const start = new Date("2026-02-17T12:00:00")
    const daysBack = 430

    for (let i=0; i<daysBack; i++){
      const day = new Date(start)
      day.setDate(start.getDate()-i)
      const date = day.toISOString().slice(0,10)

      // some days have 0 tx, some have 1-4 tx
      const r = Math.random()
      const count = r < 0.25 ? 0 : r < 0.65 ? 1 : r < 0.88 ? 2 : 3 + (Math.random() < 0.3 ? 1 : 0)

      for (let k=0; k<count; k++){
        const [merchant, meta, cat, subcat, acct] = pick(MERCHANTS)

        let type = "outflow"
        if (merchant === "Dividend" || merchant === "Salary") type = "inflow"
        if (merchant === "Transfer") type = "neutral"

        let amount = 0
        if (type === "inflow"){
          amount = merchant === "Salary" ? Math.round(rand(1800, 4200)*100)/100 : Math.round(rand(5, 80)*100)/100
        } else if (type === "outflow"){
          if (merchant === "Rent") amount = 2900
          else if (merchant === "HOA / Maintenance") amount = 1583
          else amount = Math.round(rand(2.9, 220)*100)/100
        } else {
          amount = Math.round(rand(50, 600)*100)/100
        }

        ALL.push({
          id:`tx_${date}_${i}_${k}`,
          date,
          dow: formatDow(date),
          month: formatMonth(date),
          merchant,
          meta,
          type,
          amount,
          category: cat,
          subcategory: subcat,
          account: acct,
          note: ""
        })
      }
    }

    // Sort newest -> oldest (descending by date)
    ALL.sort((a,b)=> b.date.localeCompare(a.date))

    // -------- paging state ----------
    const PAGE_SIZE = 60
    let loadedCount = 0
    let activeScenario = "default"
    let activeFilters = []  // derived by scenario
    let filterCount = 0
    let activeScope = "All"
    let activePeriod = "Feb 2026"

    function computePeriodForScenario(scn){
      // demo: keep simple, treat "Feb 2026" as a UI selection, not an actual hard constraint
      // in real app, this would drive backend query: date range bounds
      if (scn === "default") return "Feb 2026"
      if (scn === "filter1") return "Feb 2026"
      if (scn === "filter2") return "All time"
      if (scn === "search") return "All time"
      return "Feb 2026"
    }

    function computeScopeForScenario(scn){
      if (scn === "filter2") return "Marge"
      return "All"
    }

    function basePredicateForScenario(scn, tx){
      // demo-only filter logic
      if (scn === "filter1"){
        // Category=Food + Account=Chase Prime Visa
        return tx.category === "Food" && tx.account === "Chase Prime Visa"
      }
      if (scn === "filter2"){
        // Expenses only
        return tx.type === "outflow"
      }
      return true
    }

    function scenarioFilterLabels(scn){
      if (scn === "filter1") return ["Category: Food", "Account: Chase Prime Visa"]
      if (scn === "filter2") return ["Type: Expenses"]
      return []
    }

    function scenarioFilterCount(scn){
      if (scn === "filter1") return 2
      if (scn === "filter2") return 1
      return 0
    }

    // Visible pool grows as you scroll (newest -> oldest)
    function getLoadedPool(){
      return ALL.slice(0, loadedCount)
    }

    function apply(){
      const periodVal = document.getElementById("periodVal")
      const scopeVal = document.getElementById("scopeVal")
      const contextLine = document.getElementById("contextLine")
      const filterBadge = document.getElementById("filterBadge")
      const metaLine = document.getElementById("metaLine")
      const metaRight = document.getElementById("metaRight")
      const searchInput = document.getElementById("searchInput")

      activePeriod = computePeriodForScenario(activeScenario)
      activeScope = computeScopeForScenario(activeScenario)
      activeFilters = scenarioFilterLabels(activeScenario)
      filterCount = scenarioFilterCount(activeScenario)

      periodVal.textContent = activePeriod
      scopeVal.textContent = activeScope
      contextLine.textContent = `Period: ${activePeriod} · Scope: ${activeScope}`

      if (filterCount > 0){
        filterBadge.style.display = "inline-flex"
        filterBadge.textContent = String(filterCount)
      } else {
        filterBadge.style.display = "none"
      }

      const q = searchInput.value.trim()

      // 1) Start from loaded pool (infinite scroll) to simulate incremental loading
      // In real app, your backend query would page through the whole history with cursor
      let pool = getLoadedPool()

      // 2) Apply scenario filters (demo)
      pool = pool.filter(tx => basePredicateForScenario(activeScenario, tx))

      // 3) Apply search (full-text)
      pool = pool.filter(tx => matchesSearch(tx, q))

      // Meta line is only for filter/search state, not Period/Scope
      if (q){
        metaLine.textContent = `Searching: “${q}”`
      } else if (activeFilters.length){
        metaLine.textContent = `Filtered by: ${activeFilters.join(", ")}`
      } else {
        metaLine.textContent = `No filters applied`
      }
      metaRight.textContent = `Showing ${pool.length}`

      // Aggregates are based on CURRENT VISIBLE LIST
      const inflow = sum(pool.filter(t=>t.type==="inflow"), t=>t.amount)
      const outflow = sum(pool.filter(t=>t.type==="outflow"), t=>t.amount)
      const net = inflow - outflow

      const netVal = document.getElementById("netVal")
      const inVal = document.getElementById("inVal")
      const outVal = document.getElementById("outVal")

      netVal.textContent = money(net, {paren:true})
      netVal.classList.toggle("good", net > 0)
      netVal.classList.toggle("bad", net < 0)
      if (net === 0){ netVal.classList.remove("good"); netVal.classList.remove("bad") }

      inVal.textContent = money(inflow, {paren:true})
      outVal.textContent = money(-outflow, {paren:true})

      render(pool)
    }

    function render(list){
      const content = document.getElementById("content")
      content.innerHTML = ""

      if (list.length === 0){
        const empty = document.createElement("div")
        empty.className = "empty"
        empty.textContent = "No transactions match your current filters/search"
        content.appendChild(empty)
        return
      }

      // group by month then day
      const byMonth = new Map()
      for (const t of list){
        if (!byMonth.has(t.month)) byMonth.set(t.month, [])
        byMonth.get(t.month).push(t)
      }

      // months in descending order by first date in month bucket
      const monthEntries = Array.from(byMonth.entries()).sort((a,b)=>{
        const aMax = a[1][0].date
        const bMax = b[1][0].date
        return bMax.localeCompare(aMax)
      })

      for (const [month, monthList] of monthEntries){
        const monthNet = sum(monthList, impact)

        const m = document.createElement("div")
        m.className = "month"
        const left = document.createElement("div")
        left.className = "m"
        left.textContent = month
        const right = document.createElement("div")
        right.className = "mtotal"
        right.textContent = `Month total ${money(monthNet, {paren:true})}`
        m.appendChild(left)
        m.appendChild(right)
        content.appendChild(m)

        const byDay = new Map()
        for (const t of monthList){
          if (!byDay.has(t.date)) byDay.set(t.date, [])
          byDay.get(t.date).push(t)
        }

        const days = Array.from(byDay.keys()).sort((a,b)=> b.localeCompare(a))
        for (const date of days){
          const dayList = byDay.get(date)
          const dayNet = sum(dayList, impact)
          const dow = dayList[0].dow

          const dayHeader = document.createElement("div")
          dayHeader.className = "day"
          const dleft = document.createElement("div")
          dleft.className = "d"
          dleft.textContent = `${dow}, ${date}`
          const dright = document.createElement("div")
          dright.className = "dtotal"
          dright.textContent = money(dayNet, {paren:true})
          dayHeader.appendChild(dleft)
          dayHeader.appendChild(dright)
          content.appendChild(dayHeader)

          const sep = document.createElement("div")
          sep.className = "sep"
          content.appendChild(sep)

          // rows, keep impact-first within day for quick audit feel
          const sorted = [...dayList].sort((a,b)=> Math.abs(impact(b)) - Math.abs(impact(a)))

          for (const t of sorted){
            const row = document.createElement("div")
            row.className = "tx"

            const l = document.createElement("div")
            l.className = "tx-left"
            const name = document.createElement("div")
            name.className = "tx-name"
            name.textContent = t.merchant
            const sub = document.createElement("div")
            sub.className = "tx-sub"
            sub.textContent = t.meta
            l.appendChild(name)
            l.appendChild(sub)

            const amt = document.createElement("div")
            amt.className = "tx-amt"
            if (t.type === "inflow"){
              amt.classList.add("good")
              amt.textContent = money(+t.amount, {paren:true})
            } else if (t.type === "outflow"){
              amt.classList.add("bad")
              amt.textContent = money(-t.amount, {paren:true})
            } else {
              amt.textContent = money(0, {paren:true})
            }

            row.appendChild(l)
            row.appendChild(amt)
            content.appendChild(row)
          }
        }
      }
    }

    // -------- infinite scroll (load more older items) ----------
    const contentEl = document.getElementById("content")
    const loader = document.getElementById("loader")

    function canLoadMore(){
      return loadedCount < ALL.length
    }

    function loadMore(){
      if (!canLoadMore()) return
      loader.style.display = "block"
      // simulate async fetch
      setTimeout(()=>{
        loadedCount = Math.min(ALL.length, loadedCount + PAGE_SIZE)
        loader.style.display = canLoadMore() ? "none" : "none"
        apply()
        if (!canLoadMore()){
          loader.style.display = "block"
          loader.textContent = "End of history"
        }
      }, 240)
    }

    contentEl.addEventListener("scroll", ()=>{
      // if near bottom, load more
      const threshold = 240
      if (contentEl.scrollHeight - contentEl.scrollTop - contentEl.clientHeight < threshold){
        if (canLoadMore()) loadMore()
      }
    })

    // -------- wiring ----------
    const segments = document.querySelectorAll(".seg")
    segments.forEach(s=>{
      s.addEventListener("click", ()=>{
        segments.forEach(x=>x.classList.remove("active"))
        s.classList.add("active")
        activeScenario = s.getAttribute("data-scn")

        // Scenario presets for search
        const searchInput = document.getElementById("searchInput")
        if (activeScenario === "search") searchInput.value = "shake"
        else searchInput.value = ""

        // Reset loaded count so each scenario still demonstrates paging from newest
        loadedCount = PAGE_SIZE
        loader.style.display = "none"
        loader.textContent = "Loading older transactions"
        apply()
      })
    })

    const searchInput = document.getElementById("searchInput")
    const clearBtn = document.getElementById("clearBtn")
    let debounce = null

    function updateClear(){
      clearBtn.style.display = searchInput.value.trim() ? "grid" : "none"
    }

    searchInput.addEventListener("input", ()=>{
      updateClear()
      clearTimeout(debounce)
      debounce = setTimeout(()=> apply(), 220)
    })

    clearBtn.addEventListener("click", ()=>{
      searchInput.value = ""
      updateClear()
      apply()
    })

    document.getElementById("filterBtn").addEventListener("click", ()=>{
      alert("Open Filters sheet (demo)\n\nFilters should update:\n- meta line (Filtered by: ...)\n- badge count\n- aggregates\n- list + day totals\n\nPeriod/Scope remain visible as context, not as filters")
    })

    // init
    loadedCount = PAGE_SIZE
    updateClear()
    apply()
    // Preload a couple pages so it feels realistic
    loadMore()
  </script>
</body>
</html>
