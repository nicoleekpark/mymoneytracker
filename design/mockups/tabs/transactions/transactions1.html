<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Transactions — Scenarios</title>
  <style>
    :root{
      --bg:#071014;
      --surface:#0b171d;
      --surface2:#0a141a;
      --line:rgba(255,255,255,.08);
      --line2:rgba(255,255,255,.12);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.62);
      --muted2:rgba(255,255,255,.45);
      --good:#62d7b4; /* inflow */
      --bad:#ff8a6a;  /* outflow */
      --radius:16px;
      --tabular: tabular-nums;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 800px at 50% -200px, rgba(98,215,180,.10), transparent 55%),
        radial-gradient(1000px 700px at 90% 0px, rgba(255,138,106,.08), transparent 55%),
        var(--bg);
    }

    .app{
      width:min(430px, 100vw);
      height:100vh;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      padding:12px 12px 18px;
    }

    /* Sticky controls */
    .top{
      position:sticky;
      top:0;
      z-index:10;
      padding-top:8px;
      background:linear-gradient(180deg, rgba(7,16,20,1), rgba(7,16,20,.88));
      border-bottom:1px solid var(--line);
      backdrop-filter:none;
    }

    .bar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:8px 2px 10px;
    }

    .left{
      display:flex;
      flex-direction:column;
      gap:4px;
      min-width:0;
    }

    .title{
      font-size:15px;
      letter-spacing:.02em;
      color:rgba(255,255,255,.90);
    }
    .subtitle{
      font-size:12px;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--muted2);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .right{
      display:flex;
      align-items:center;
      gap:8px;
      flex:0 0 auto;
    }

    .pill{
      padding:8px 10px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      border-radius:999px;
      font-size:13px;
      color:rgba(255,255,255,.80);
      user-select:none;
      white-space:nowrap;
    }

    .iconbtn{
      width:40px;
      height:36px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      display:grid;
      place-items:center;
      position:relative;
      cursor:pointer;
      user-select:none;
    }
    .iconbtn:hover{ border-color:rgba(255,255,255,.14); background:rgba(255,255,255,.05); }
    .badge{
      position:absolute;
      top:-6px;
      right:-6px;
      min-width:18px;
      height:18px;
      padding:0 6px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.06);
      color:rgba(255,255,255,.82);
      font-size:11px;
      display:none;
      align-items:center;
      justify-content:center;
      font-variant-numeric:var(--tabular);
    }

    /* Search */
    .search{
      padding:0 2px 10px;
    }
    .searchbox{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.02);
      border-radius:14px;
    }
    .searchbox svg{ width:16px; height:16px; opacity:.75; }
    .searchbox input{
      flex:1;
      border:0;
      outline:0;
      background:transparent;
      color:rgba(255,255,255,.90);
      font-size:14px;
    }
    .searchbox input::placeholder{ color:rgba(255,255,255,.35); }
    .clear{
      width:26px;
      height:26px;
      border-radius:10px;
      display:grid;
      place-items:center;
      border:1px solid var(--line);
      background:rgba(255,255,255,.02);
      cursor:pointer;
      display:none;
    }
    .clear:hover{ background:rgba(255,255,255,.05); border-color:rgba(255,255,255,.14); }
    .clear svg{ width:14px; height:14px; opacity:.8; }

    /* Meta line (quiet) */
    .meta{
      padding:0 2px 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .metaline{
      font-size:12px;
      color:var(--muted2);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .meta-right{
      display:flex;
      align-items:center;
      gap:8px;
      color:var(--muted2);
      font-size:12px;
      flex:0 0 auto;
    }

    /* Scenario switch (dev/demo only) */
    .scenarios{
      padding:0 2px 12px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .seg{
      padding:8px 10px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.02);
      border-radius:999px;
      font-size:12px;
      color:rgba(255,255,255,.78);
      cursor:pointer;
      user-select:none;
    }
    .seg.active{
      border-color:rgba(255,255,255,.18);
      background:rgba(255,255,255,.05);
      color:rgba(255,255,255,.88);
    }

    /* Aggregate block (scrolls away) */
    .agg{
      padding:10px 2px 12px;
      border-top:1px solid var(--line);
      border-bottom:1px solid var(--line);
      margin:0 0 10px;
      background:rgba(255,255,255,.01);
    }
    .aggrow{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      padding:8px 0;
      gap:10px;
    }
    .aggrow .k{
      font-size:12px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted2);
    }
    .aggrow .v{
      font-size:16px;
      font-variant-numeric:var(--tabular);
      color:rgba(255,255,255,.90);
      white-space:nowrap;
    }
    .v.good{ color:rgba(98,215,180,.92); }
    .v.bad{ color:rgba(255,138,106,.92); }

    /* List */
    .content{
      flex:1;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      padding:4px 2px 0;
    }

    .month{
      margin-top:8px;
      padding:10px 0 8px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:10px;
    }
    .month .m{
      font-size:12px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted2);
    }
    .month .mtotal{
      font-size:12px;
      font-variant-numeric:var(--tabular);
      color:var(--muted2);
      white-space:nowrap;
    }

    .day{
      padding:12px 0 8px;
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:10px;
    }
    .day .d{
      font-size:12px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted2);
      white-space:nowrap;
    }
    .day .dtotal{
      font-size:12px;
      font-variant-numeric:var(--tabular);
      color:rgba(255,255,255,.72);
      white-space:nowrap;
    }
    .sep{
      height:1px;
      background:var(--line);
    }

    .tx{
      display:grid;
      grid-template-columns: 1fr auto;
      gap:12px;
      padding:12px 0;
      border-bottom:1px solid var(--line);
      align-items:center;
    }
    .tx-left{ min-width:0; }
    .tx-name{
      font-size:16px;
      color:rgba(255,255,255,.92);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .tx-sub{
      margin-top:4px;
      font-size:13px;
      color:var(--muted2);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .tx-amt{
      font-size:16px;
      font-variant-numeric:var(--tabular);
      white-space:nowrap;
    }
    .tx-amt.good{ color:rgba(98,215,180,.92); }
    .tx-amt.bad{ color:rgba(255,138,106,.92); }

    .empty{
      padding:18px 0;
      color:var(--muted2);
      font-size:13px;
    }

    .safe{ height:18px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <div class="bar">
        <div class="left">
          <div class="title">Transactions</div>
          <div class="subtitle" id="subtitle">Feb 2026 · All</div>
        </div>
        <div class="right">
          <div class="pill" id="periodPill">Feb 2026</div>
          <div class="pill" id="scopePill">All</div>
          <div class="iconbtn" id="filterBtn" aria-label="Filters">
            <span class="badge" id="filterBadge">2</span>
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M4 6h16M7 12h10M10 18h4" stroke="rgba(255,255,255,.78)" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="search">
        <div class="searchbox">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" stroke="rgba(255,255,255,.78)" stroke-width="2"/>
            <path d="M16.5 16.5 21 21" stroke="rgba(255,255,255,.78)" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <input id="searchInput" placeholder="Search transactions" />
          <div class="clear" id="clearBtn" title="Clear">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M7 7l10 10M17 7 7 17" stroke="rgba(255,255,255,.78)" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="meta">
        <div class="metaline" id="metaLine">Showing all transactions</div>
        <div class="meta-right" id="metaRight"></div>
      </div>

      <!-- Demo: scenario switcher -->
      <div class="scenarios" aria-label="Scenarios (demo)">
        <div class="seg active" data-scn="default">Default</div>
        <div class="seg" data-scn="filter1">Filter 1</div>
        <div class="seg" data-scn="filter2">Filter 2</div>
        <div class="seg" data-scn="search">Search</div>
      </div>
    </div>

    <div class="agg" id="agg">
      <div class="aggrow">
        <div class="k">Net</div>
        <div class="v" id="netVal">($217.20)</div>
      </div>
      <div class="aggrow">
        <div class="k">Inflow</div>
        <div class="v good" id="inVal">$0.00</div>
      </div>
      <div class="aggrow">
        <div class="k">Outflow</div>
        <div class="v bad" id="outVal">($217.20)</div>
      </div>
    </div>

    <div class="content" id="content"></div>
    <div class="safe"></div>
  </div>

  <script>
    // ---------- Helpers ----------
    function money(n, opts={paren:true}) {
      const signNeg = n < 0
      const abs = Math.abs(n)
      const s = abs.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})
      const val = "$" + s
      if (!signNeg) return val
      return opts.paren ? "(" + val + ")" : "-" + val
    }

    function sum(list, fn){ return list.reduce((a,x)=>a+fn(x), 0) }

    // type: "inflow" | "outflow" | "neutral"
    // Note: for ledger correctness, amount is positive number; we apply sign in rendering
    // outflow => negative impact in aggregates
    const DATA = [
      // Feb 2
      { id:"t1", date:"2026-02-02", dow:"Mon", month:"February 2026", merchant:"Dinner", meta:"Shake Shack · Chase Sapphire Reserve", type:"outflow", amount:83.25, category:"Food", subcategory:"Dining", account:"Chase Sapphire Reserve", note:"" },
      { id:"t2", date:"2026-02-02", dow:"Mon", month:"February 2026", merchant:"MTA", meta:"Transit · Apple Pay", type:"outflow", amount:2.90, category:"Transport", subcategory:"Transit", account:"Apple Pay", note:"" },

      // Feb 1
      { id:"t3", date:"2026-02-01", dow:"Sun", month:"February 2026", merchant:"Groceries", meta:"Trader Joe's · Chase Prime Visa", type:"outflow", amount:125.05, category:"Food", subcategory:"Groceries", account:"Chase Prime Visa", note:"" },
      { id:"t4", date:"2026-02-01", dow:"Sun", month:"February 2026", merchant:"Coffee", meta:"Stumptown · Cash", type:"outflow", amount:6.00, category:"Food", subcategory:"Coffee", account:"Cash", note:"Morning" },

      // Feb 3 (inflow example)
      { id:"t5", date:"2026-02-03", dow:"Tue", month:"February 2026", merchant:"Dividend", meta:"Investments · Brokerage", type:"inflow", amount:14.75, category:"Income", subcategory:"Dividend", account:"Brokerage", note:"" },

      // Feb 4 (neutral transfer)
      { id:"t6", date:"2026-02-04", dow:"Wed", month:"February 2026", merchant:"Transfer", meta:"Checking → Savings", type:"neutral", amount:250.00, category:"Transfer", subcategory:"Internal", account:"Checking", note:"" }
    ]

    function impact(tx){
      if (tx.type === "inflow") return +tx.amount
      if (tx.type === "outflow") return -tx.amount
      return 0
    }

    function matchesSearch(tx, q){
      if (!q) return true
      const s = q.toLowerCase().trim()
      if (!s) return true

      // Full-text across common fields (simple implementation)
      const fields = [
        tx.merchant, tx.meta, tx.category, tx.subcategory, tx.account, tx.note,
        tx.amount.toFixed(2), tx.date
      ].join(" ").toLowerCase()

      return fields.includes(s)
    }

    function applyScenario(scn, qOverride=null){
      // scenario controls (period/scope/filter states)
      const subtitle = document.getElementById("subtitle")
      const periodPill = document.getElementById("periodPill")
      const scopePill = document.getElementById("scopePill")
      const filterBadge = document.getElementById("filterBadge")
      const metaLine = document.getElementById("metaLine")
      const metaRight = document.getElementById("metaRight")
      const searchInput = document.getElementById("searchInput")

      let period = "Feb 2026"
      let scope = "All"
      let filters = [] // text labels
      let filterCount = 0
      let q = qOverride !== null ? qOverride : searchInput.value

      // Base dataset for the period (keep simple: all DATA is in Feb)
      let base = [...DATA]

      if (scn === "default"){
        scope = "All"
        filters = []
        filterCount = 0
        if (qOverride !== null) searchInput.value = qOverride
        q = searchInput.value
      }

      // Filter scenario 1: Category=Food + Account=Chase Prime Visa (example)
      if (scn === "filter1"){
        scope = "All"
        filters = ["Category: Food", "Account: Chase Prime Visa"]
        filterCount = 2
        base = base.filter(t => t.category === "Food" && t.account === "Chase Prime Visa")
        searchInput.value = "" // demo: no search
        q = ""
      }

      // Filter scenario 2: Expense-only (outflows only), scope=Marge (example)
      if (scn === "filter2"){
        scope = "Marge"
        filters = ["Type: Expenses"]
        filterCount = 1
        base = base.filter(t => t.type === "outflow")
        searchInput.value = "" // demo: no search
        q = ""
      }

      // Search scenario: full-text query over all (e.g., "shake")
      if (scn === "search"){
        scope = "All"
        filters = []
        filterCount = 0
        searchInput.value = "shake"
        q = "shake"
      }

      // Apply search filter (full-text)
      const list = base.filter(t => matchesSearch(t, q))

      // Update pills + subtitle
      periodPill.textContent = period
      scopePill.textContent = scope
      subtitle.textContent = `${period} · ${scope}`

      // Filter badge
      if (filterCount > 0){
        filterBadge.style.display = "inline-flex"
        filterBadge.textContent = String(filterCount)
      } else {
        filterBadge.style.display = "none"
      }

      // Meta line
      metaRight.textContent = ""
      if (q && q.trim()){
        metaLine.textContent = `Searching: “${q.trim()}”`
        metaRight.textContent = `Showing ${list.length} result${list.length === 1 ? "" : "s"}`
      } else if (filters.length){
        metaLine.textContent = `Filtered by: ${filters.join(", ")}`
        metaRight.textContent = `Showing ${list.length}`
      } else {
        metaLine.textContent = `Showing all transactions`
        metaRight.textContent = `Showing ${list.length}`
      }

      // Aggregates based on CURRENT VISIBLE LIST
      const inflow = sum(list.filter(t=>t.type==="inflow"), t=>t.amount)
      const outflow = sum(list.filter(t=>t.type==="outflow"), t=>t.amount)
      const net = inflow - outflow

      const netVal = document.getElementById("netVal")
      const inVal = document.getElementById("inVal")
      const outVal = document.getElementById("outVal")

      netVal.textContent = money(net, {paren:true})
      netVal.classList.toggle("good", net > 0)
      netVal.classList.toggle("bad", net < 0)
      // keep neutral color if exactly 0
      if (net === 0){
        netVal.classList.remove("good")
        netVal.classList.remove("bad")
      }

      inVal.textContent = money(inflow, {paren:true})
      outVal.textContent = money(-outflow, {paren:true}) // show negative in parentheses

      // Render list with Month -> Day grouping; Day total ALWAYS shown
      render(list, net)
    }

    function render(list){
      const content = document.getElementById("content")
      content.innerHTML = ""

      if (list.length === 0){
        const empty = document.createElement("div")
        empty.className = "empty"
        empty.textContent = "No transactions match your current filters/search"
        content.appendChild(empty)
        return
      }

      // group by month then day (date)
      const byMonth = new Map()
      for (const t of list){
        if (!byMonth.has(t.month)) byMonth.set(t.month, [])
        byMonth.get(t.month).push(t)
      }

      for (const [month, monthList] of byMonth.entries()){
        // month total based on visible data
        const monthNet = sum(monthList, impact)

        const m = document.createElement("div")
        m.className = "month"
        const left = document.createElement("div")
        left.className = "m"
        left.textContent = month
        const right = document.createElement("div")
        right.className = "mtotal"
        right.textContent = `Month total ${money(monthNet, {paren:true})}`
        m.appendChild(left)
        m.appendChild(right)
        content.appendChild(m)

        // day grouping
        const byDay = new Map()
        for (const t of monthList){
          if (!byDay.has(t.date)) byDay.set(t.date, [])
          byDay.get(t.date).push(t)
        }

        // sort days desc
        const days = Array.from(byDay.keys()).sort((a,b)=> b.localeCompare(a))
        for (const date of days){
          const dayList = byDay.get(date)
          // Day total ALWAYS shown (visible dataset)
          const dayNet = sum(dayList, impact)
          const dow = dayList[0].dow

          const dayHeader = document.createElement("div")
          dayHeader.className = "day"
          const dleft = document.createElement("div")
          dleft.className = "d"
          dleft.textContent = `${dow}, ${date}`
          const dright = document.createElement("div")
          dright.className = "dtotal"
          dright.textContent = money(dayNet, {paren:true})
          dayHeader.appendChild(dleft)
          dayHeader.appendChild(dright)

          content.appendChild(dayHeader)
          const sep = document.createElement("div")
          sep.className = "sep"
          content.appendChild(sep)

          // list rows (chronological within day optional; keeping simple by amount impact desc could be a preference)
          // Here: chronological not required; we keep stable: outflows first by amount desc, then inflows, then neutral
          const sorted = [...dayList].sort((a,b)=> Math.abs(impact(b)) - Math.abs(impact(a)))

          for (const t of sorted){
            const row = document.createElement("div")
            row.className = "tx"

            const l = document.createElement("div")
            l.className = "tx-left"
            const name = document.createElement("div")
            name.className = "tx-name"
            name.textContent = t.merchant
            const sub = document.createElement("div")
            sub.className = "tx-sub"
            sub.textContent = t.meta
            l.appendChild(name)
            l.appendChild(sub)

            const amt = document.createElement("div")
            amt.className = "tx-amt"
            if (t.type === "inflow"){
              amt.classList.add("good")
              amt.textContent = money(+t.amount, {paren:true})
            } else if (t.type === "outflow"){
              amt.classList.add("bad")
              amt.textContent = money(-t.amount, {paren:true})
            } else {
              // neutral stays neutral
              amt.textContent = money(0, {paren:true})
            }

            row.appendChild(l)
            row.appendChild(amt)
            content.appendChild(row)
          }
        }
      }
    }

    // ---------- Wiring ----------
    const segments = document.querySelectorAll(".seg")
    segments.forEach(s=>{
      s.addEventListener("click", ()=>{
        segments.forEach(x=>x.classList.remove("active"))
        s.classList.add("active")
        const scn = s.getAttribute("data-scn")
        applyScenario(scn)
      })
    })

    const searchInput = document.getElementById("searchInput")
    const clearBtn = document.getElementById("clearBtn")

    let debounce = null
    function updateClear(){
      clearBtn.style.display = searchInput.value.trim() ? "grid" : "none"
    }
    searchInput.addEventListener("input", ()=>{
      updateClear()
      // keep current scenario selection unless it is a demo scenario; we’ll apply search on top of current state
      const active = document.querySelector(".seg.active")?.getAttribute("data-scn") || "default"
      clearTimeout(debounce)
      debounce = setTimeout(()=> applyScenario(active), 220)
    })
    clearBtn.addEventListener("click", ()=>{
      searchInput.value = ""
      updateClear()
      const active = document.querySelector(".seg.active")?.getAttribute("data-scn") || "default"
      applyScenario(active)
    })

    // Demo: filter icon click (no real modal)
    document.getElementById("filterBtn").addEventListener("click", ()=>{
      alert("Open Filters sheet (demo)\n\nFilters should update:\n- meta line\n- badge count\n- aggregates\n- list + day totals")
    })

    // Init
    updateClear()
    applyScenario("default")
  </script>
</body>
</html>
