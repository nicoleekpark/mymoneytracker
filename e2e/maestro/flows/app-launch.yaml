appId: com.houseofhuynh.finance
---
# App Launch Flow
# Tests basic app launch and initial screen rendering

- launchApp:
    clearState: true

# Wait for splash screen and app to load
- waitForAnimationToEnd

# Verify the app has loaded by checking for key UI elements
- assertVisible:
    text: "HoH"
    optional: true

- assertVisible:
    text: "Dashboard"
    optional: true

# Verify bottom navigation is visible (if app uses tab navigation)
- assertVisible:
    id: "bottom-tabs"
    optional: true

# Verify add button is accessible
- assertVisible:
    id: "add-transaction-button"
    optional: true

# Take screenshot for visual regression
- screenshot: app_launch_complete
