appId: com.houseofhuynh.finance
---
# Add Income Flow
# Tests the complete flow of adding a new income transaction

- launchApp:
    clearState: true

# Wait for app to load
- waitForAnimationToEnd

# Navigate to add transaction
- tapOn:
    id: "add-transaction-button"

# Select income type
- tapOn:
    text: "Income"

# Enter amount using keypad (e.g., $500.00 = 50000 cents)
- tapOn:
    id: "keypad-5"
- tapOn:
    id: "keypad-0"
- tapOn:
    id: "keypad-0"
- tapOn:
    id: "keypad-0"
- tapOn:
    id: "keypad-0"

# Select a category
- tapOn:
    text: "Salary"

# Save the transaction
- tapOn:
    text: "Save"
    optional: true
- tapOn:
    id: "save-button"
    optional: true

# Verify success
- waitForAnimationToEnd
