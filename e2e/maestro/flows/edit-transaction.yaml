appId: com.houseofhuynh.finance
---
# Edit Transaction Flow
# Tests editing an existing transaction

- launchApp

# Wait for app to load
- waitForAnimationToEnd

# First, create a transaction to edit
- tapOn:
    id: "add-transaction-button"

- tapOn:
    text: "Expense"

# Enter initial amount
- tapOn:
    id: "keypad-1"
- tapOn:
    id: "keypad-5"
- tapOn:
    id: "keypad-0"
- tapOn:
    id: "keypad-0"

# Select category
- tapOn:
    text: "Food"
    optional: true

# Save
- tapOn:
    id: "save-button"
    optional: true
- tapOn:
    text: "Save"
    optional: true

- waitForAnimationToEnd

# Navigate to transaction list or tap on the transaction
- tapOn:
    text: "Transactions"
    optional: true

# Tap on the created transaction to edit
- tapOn:
    textContains: "$15.00"
    optional: true

# If there's an edit button
- tapOn:
    id: "edit-button"
    optional: true
- tapOn:
    text: "Edit"
    optional: true

# Clear and enter new amount
- tapOn:
    id: "clear-button"
    optional: true
- tapOn:
    text: "Clear"
    optional: true

# Enter new amount ($25.00)
- tapOn:
    id: "keypad-2"
    optional: true
- tapOn:
    id: "keypad-5"
    optional: true
- tapOn:
    id: "keypad-0"
    optional: true
- tapOn:
    id: "keypad-0"
    optional: true

# Save changes
- tapOn:
    id: "save-button"
    optional: true
- tapOn:
    text: "Save"
    optional: true

- waitForAnimationToEnd
