appId: com.houseofhuynh.finance
---
# View Categories Flow
# Tests viewing expense categories breakdown

- launchApp

# Wait for app to load
- waitForAnimationToEnd

# Navigate to dashboard or summary view
- tapOn:
    text: "Dashboard"
    optional: true

- waitForAnimationToEnd

# Look for category breakdown section
- assertVisible:
    text: "Expenses"
    optional: true

# Tap to view category details
- tapOn:
    text: "Food"
    optional: true
- tapOn:
    textContains: "Food"
    optional: true

- waitForAnimationToEnd

# Verify subcategories are shown
- assertVisible:
    text: "Eating Out"
    optional: true
- assertVisible:
    text: "Groceries"
    optional: true

# Go back
- back
- waitForAnimationToEnd
