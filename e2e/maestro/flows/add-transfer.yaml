appId: com.houseofhuynh.finance
---
# Add Transfer Flow
# Tests the complete flow of adding a transfer between accounts

- launchApp:
    clearState: true

# Wait for app to load
- waitForAnimationToEnd

# Navigate to add transaction
- tapOn:
    id: "add-transaction-button"

# Select transfer type
- tapOn:
    text: "Transfer"

# Enter amount (e.g., $100.00 = 10000 cents)
- tapOn:
    id: "keypad-1"
- tapOn:
    id: "keypad-0"
- tapOn:
    id: "keypad-0"
- tapOn:
    id: "keypad-0"
- tapOn:
    id: "keypad-0"

# Select source account (From)
- tapOn:
    text: "From Account"
    optional: true
- tapOn:
    id: "from-account-picker"
    optional: true
- tapOn:
    text: "Checking"
    optional: true

# Select destination account (To)
- tapOn:
    text: "To Account"
    optional: true
- tapOn:
    id: "to-account-picker"
    optional: true
- tapOn:
    text: "Savings"
    optional: true

# Save the transfer
- tapOn:
    text: "Save"
    optional: true
- tapOn:
    id: "save-button"
    optional: true

# Verify success
- waitForAnimationToEnd
