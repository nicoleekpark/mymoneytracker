appId: com.houseofhuynh.finance
---
# Navigate Accounts Flow
# Tests viewing and navigating through accounts

- launchApp

# Wait for app to load
- waitForAnimationToEnd

# Navigate to accounts tab/section
- tapOn:
    text: "Accounts"
    optional: true
- tapOn:
    id: "accounts-tab"
    optional: true

- waitForAnimationToEnd

# Verify accounts are visible
- assertVisible:
    textContains: "Checking"
    optional: true

- assertVisible:
    textContains: "Savings"
    optional: true

- assertVisible:
    textContains: "Credit"
    optional: true

# Tap on an account to view details
- tapOn:
    text: "Checking"
    optional: true
- tapOn:
    textContains: "Checking Account"
    optional: true

- waitForAnimationToEnd

# View account transactions
- assertVisible:
    text: "Transactions"
    optional: true

# Go back
- back
- waitForAnimationToEnd
